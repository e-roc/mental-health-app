services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: haven
      POSTGRES_PASSWORD: haven_dev_password
      POSTGRES_DB: mental_health_app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U haven -d mental_health_app"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
